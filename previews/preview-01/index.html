<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview 01 - Hero EcoScape</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="preview-frame" aria-label="Hero preview inspirado em EcoScape">
    <section class="hero-preview">
      <nav class="hero-preview__nav" aria-label="Navegação do preview">
        <a class="hero-preview__brand" href="#">
          <span class="hero-preview__brand-mark"></span>
          EcoScape
        </a>

        <div class="hero-preview__links">
          <a href="#">Início</a>
          <a href="#">Sobre</a>
          <a href="#">Serviços</a>
          <a href="#">Blog</a>
          <a href="#">Páginas</a>
        </div>

        <div class="hero-preview__nav-actions">
          <a class="hero-preview__nav-cta" href="#">Começar</a>
          <a class="hero-preview__icon-btn" href="#" aria-label="Abrir contato"></a>
        </div>
      </nav>

      <div class="hero-preview__image">
        <img src="./assets/hero-garden.png" alt="" />
      </div>

      <div class="hero-preview__content">
        <p class="hero-preview__eyebrow">// Manutenção de gramado</p>
        <h1>
          <span>Jardins saudáveis</span>
          <span>em <em>todas</em> as</span>
          <span>estações</span>
        </h1>
        <p class="hero-preview__copy">
          Cuidado especializado e manutenção sob medida para manter seu jardim verde,
          vivo e bonito em qualquer clima.
        </p>
      </div>

      <div class="hero-preview__actions">
        <a href="#">Agendar agora</a>
        <a class="hero-preview__icon-btn" href="#" aria-label="Agendar"></a>
      </div>

      <aside class="hero-preview__stat" aria-label="Indicador de prova social">
        <div>
          <strong>7M+</strong>
          <span>clientes ativos</span>
          <div class="hero-preview__avatars" aria-hidden="true">
            <img src="./assets/avatar-01.png" alt="" />
            <img src="./assets/avatar-02.png" alt="" />
            <img src="./assets/avatar-01.png" alt="" />
          </div>
        </div>
        <img class="hero-preview__person" src="./assets/hero-worker.png" alt="" />
      </aside>
    </section>
  </main>
</body>
</html>
