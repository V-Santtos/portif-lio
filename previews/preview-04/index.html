<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview 04 - Hero Dinevo</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="preview-frame" aria-label="Hero preview inspirado em Dinevo">
    <section class="dinevo-hero">
      <nav class="dinevo-nav" aria-label="Navegação do preview">
        <a class="dinevo-brand" href="#">
          <span class="dinevo-brand__mark" aria-hidden="true"></span>
          <span>Dinevo</span>
        </a>

        <div class="dinevo-nav__links">
          <a class="is-active" href="#">Início</a>
          <a href="#">Sobre</a>
          <a href="#">Menu</a>
          <a href="#">Páginas</a>
          <a href="#">Contato</a>
        </div>

        <a class="dinevo-nav__cta" href="#">
          Reservar mesa
          <span aria-hidden="true">↗</span>
        </a>
      </nav>

      <div class="dinevo-hero__media" aria-hidden="true">
        <img src="./assets/hero-plate.png" alt="" />
        <div class="dinevo-hero__shade"></div>
      </div>

      <div class="dinevo-hero__content">
        <p class="dinevo-hero__eyebrow" lang="ja">上質な時間を</p>

        <h1>
          <span>Onde a elegância</span>
          <span>encontra sabor</span>
        </h1>

        <div class="dinevo-social" aria-label="Clientes satisfeitos">
          <div class="dinevo-social__avatars" aria-hidden="true">
            <img src="./assets/dish-small.png" alt="" />
            <img src="./assets/chef-small.png" alt="" />
            <img src="./assets/chef-portrait.png" alt="" />
            <span>10+</span>
          </div>
          <p>
            Transformamos cada refeição em uma experiência memorável.<br />
            Pratos marcantes preparados a cada serviço.
          </p>
        </div>

        <div class="dinevo-hero__actions">
          <a class="dinevo-hero__primary" href="#">
            Explorar menu
            <span aria-hidden="true">↗</span>
          </a>
        </div>
      </div>

      <aside class="dinevo-signature-card" aria-label="Prato em destaque">
        <header>
          <strong>Experimente nossos pratos autorais</strong>
          <span aria-hidden="true">↘</span>
        </header>
        <img src="./assets/signature-dish-b.jpg" alt="" />
      </aside>
    </section>
  </main>
</body>
</html>
