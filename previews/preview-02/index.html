<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview 02 - Hero Nexous</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="preview-frame" aria-label="Hero preview inspirado em Nexous">
    <section class="nexous-hero">
      <div class="nexous-hero__media" aria-hidden="true">
        <img src="./assets/hero-bg.png" alt="" />
      </div>

      <nav class="nexous-hero__nav" aria-label="Navegação do preview">
        <div class="nexous-hero__nav-group">
          <a href="#">Início</a>
          <a href="#">Sobre</a>
          <a href="#">Serviços</a>
        </div>

        <a class="nexous-hero__brand" href="#">NEXOUS<span>&trade;</span></a>

        <div class="nexous-hero__nav-group nexous-hero__nav-group--right">
          <a href="#">Projetos</a>
          <a class="nexous-hero__pages" href="#">Todas as páginas</a>
          <a class="nexous-hero__contact" href="#">
            <span>Contato</span>
            <i aria-hidden="true"></i>
          </a>
        </div>
      </nav>

      <div class="nexous-hero__content">
        <p class="nexous-hero__badge">Agência criativa digital</p>

        <h1 class="nexous-hero__title">
          <span class="nexous-hero__line nexous-hero__line--top">
            <img src="./assets/thumb-innovative-left.png" alt="" />
            <span>SOLUÇÕES</span>
            <img src="./assets/thumb-title-small.png" alt="" />
          </span>
          <span class="nexous-hero__line nexous-hero__line--serif">INOVADORAS PARA</span>
          <span class="nexous-hero__line">ELEVAR SUA</span>
          <span class="nexous-hero__line nexous-hero__line--bottom">
            <img src="./assets/thumb-brand-left.png" alt="" />
            <span>MARCA</span>
            <img src="./assets/thumb-brand-right.png" alt="" />
          </span>
        </h1>

        <p class="nexous-hero__copy">
          Da criação ao desempenho, desenvolvemos estratégias que geram crescimento
          mensurável para marcas ambiciosas.
        </p>

        <a class="nexous-hero__cta" href="#">
          <span>Agendar conversa</span>
          <i aria-hidden="true"></i>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
