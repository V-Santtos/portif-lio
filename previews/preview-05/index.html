<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Preview 05 - Hero Minta</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="preview-frame" aria-label="Hero preview inspirado em Minta">
    <section class="minta-hero">
      <div class="minta-hero__media" aria-hidden="true">
        <img src="./assets/hero-hand.jpg" alt="" />
        <div class="minta-hero__beam"></div>
      </div>

      <nav class="minta-nav" aria-label="Navegacao do preview">
        <a class="minta-brand" href="#">
          <span class="minta-brand__mark" aria-hidden="true"></span>
          minta
        </a>
        <div class="minta-nav__links">
          <a href="#">Recursos</a>
          <a href="#">Planos</a>
          <a href="#">Blog</a>
        </div>
        <a class="minta-nav__cta" href="#">Acesso antecipado</a>
      </nav>

      <div class="minta-hero__content">
        <p class="minta-hero__eyebrow">Carteira cripto com IA</p>
        <h1>
          <span>Entre na luz.</span>
          <span>Seu futuro ja espera.</span>
        </h1>
        <p>
          A Minta e a carteira cripto inteligente que guia voce do primeiro
          deposito aos primeiros grandes resultados.
        </p>
        <a class="minta-hero__cta" href="#">Entrar na lista</a>
      </div>
    </section>
  </main>
</body>
</html>
